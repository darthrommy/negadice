name: Release

# Cutting a release is a single manual action: open the Actions tab, pick this
# workflow, and click "Run workflow". No inputs — the version is derived from
# today's date as YY.MONTH.PATCH (CalVer), where PATCH counts releases already
# made this month. The two-digit year keeps the major component <= 255, which
# Windows MSI/WiX requires of every version part.
#
# The build runs BEFORE anything is committed or tagged: `prepare` only computes
# the version, `build` compiles each platform with the version injected locally
# (never committed), and `publish` runs only if every build succeeded — it is the
# single place that touches main, the tag, and the release. So a failed build
# leaves no commit, no tag, and nothing to clean up.
on:
  workflow_dispatch:

# Don't allow two releases to run at once (they'd race on the version + tag).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need full tag history to compute the next patch number

      - name: Compute CalVer version
        id: version
        run: |
          YEAR=$(date -u +%y) # two digits: MSI caps each version component at 255
          MONTH=$(date -u +%-m) # no leading zero, so it stays valid semver/Cargo
          PREFIX="v${YEAR}.${MONTH}."
          # Highest existing patch for this month, +1 (robust against deleted tags).
          LAST=$(git tag -l "${PREFIX}*" | sed "s|^${PREFIX}||" | sort -n | tail -1)
          if [ -z "$LAST" ]; then PATCH=0; else PATCH=$((LAST + 1)); fi
          VERSION="${YEAR}.${MONTH}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # universal (Intel + Apple Silicon) .dmg
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Inject version (not committed — only this build sees it)
        shell: bash
        run: node scripts/set-version.mjs "${{ needs.prepare.outputs.version }}"

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Build only — no tagName/releaseName, so the action uploads nothing and
      # just exposes the built installer paths via the artifactPaths output.
      - name: Build app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.args }}

      - name: Stage built installers
        shell: bash
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: node scripts/stage-artifacts.mjs

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}
          path: release-artifacts/*
          if-no-files-found: error

  publish:
    needs: [prepare, build] # only reached if every build job succeeded
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the bump, push the tag, create the release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Bump version on main
        run: node scripts/set-version.mjs "${{ needs.prepare.outputs.version }}"

      - name: Commit and push the bump
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "release $VERSION"
          # Retry once if main moved while we were building.
          git push origin "HEAD:$BRANCH" || {
            git pull --rebase origin "$BRANCH"
            git push origin "HEAD:$BRANCH"
          }

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: installers-*
          merge-multiple: true
          path: dist

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --draft \
            --target "$(git rev-parse HEAD)" \
            --title "negadice $TAG" \
            --notes "Automated draft — edit these notes before publishing." \
            dist/*
